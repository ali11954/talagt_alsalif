{% extends "base.html" %}

{% block title %}تعديل مورد - ثلاجة الصليف{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h4 class="mb-1"><i class="fas fa-edit text-primary"></i> تعديل بيانات المورد</h4>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">الرئيسية</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('suppliers') }}">الموردين</a></li>
                    <li class="breadcrumb-item active">تعديل</li>
                </ol>
            </nav>
        </div>
        <div>
            <a href="{{ url_for('suppliers') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-right ml-1"></i> رجوع
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <i class="fas fa-address-card text-primary ml-2"></i>
            تعديل بيانات: <strong>{{ supplier.name }}</strong>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label required-field">
                            <i class="fas fa-building ml-1"></i> اسم المورد
                        </label>
                        <input type="text" name="name" class="form-control"
                               value="{{ supplier.name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            <i class="fas fa-user-tie ml-1"></i> شخص التواصل
                        </label>
                        <input type="text" name="contact_person" class="form-control"
                               value="{{ supplier.contact_person or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            <i class="fas fa-phone ml-1"></i> رقم الهاتف
                        </label>
                        <input type="tel" name="phone" class="form-control"
                               value="{{ supplier.phone or '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            <i class="fas fa-envelope ml-1"></i> البريد الإلكتروني
                        </label>
                        <input type="email" name="email" class="form-control"
                               value="{{ supplier.email or '' }}">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">
                            <i class="fas fa-map-marker-alt ml-1"></i> العنوان
                        </label>
                        <textarea name="address" class="form-control" rows="3">{{ supplier.address or '' }}</textarea>
                    </div>
                </div>
                <hr>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save ml-2"></i> تحديث البيانات
                    </button>
                    <a href="{{ url_for('suppliers') }}" class="btn btn-secondary">
                        <i class="fas fa-times ml-2"></i> إلغاء
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .required-field::after {
        content: "*";
        color: #dc3545;
        margin-right: 4px;
    }
</style>
{% endblock %}
