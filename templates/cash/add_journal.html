{% extends "base.html" %}

{% block title %}إضافة قيد يومية{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="fas fa-plus"></i> إضافة قيد يومية جديد</h4>
    <a href="{{ url_for('journal_entries') }}" class="btn btn-secondary btn-sm">
        <i class="fas fa-arrow-right"></i> رجوع
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" id="journalForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">رقم الإذن (اختياري)</label>
                    <input type="text" name="reference_number" class="form-control"
                           placeholder="يتم إنشاؤه تلقائياً">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">البيان *</label>
                    <input type="text" name="description" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">تفاصيل القيد</label>
                <table class="table table-bordered" id="detailsTable">
                    <thead>
                        <tr>
                            <th>نوع الحساب</th>
                            <th>اسم الحساب</th>
                            <th>المبلغ</th>
                            <th>نوع</th>
                            <th>ملاحظات</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="detailsBody">
                        <tr>
                            <td>
                                <select name="account_type[]" class="form-select">
                                    <option value="cash">صندوق</option>
                                    <option value="supplier">مورد</option>
                                    <option value="customer">عميل</option>
                                    <option value="expense">مصروفات</option>
                                    <option value="income">إيرادات</option>
                                </select>
                            </td>
                            <td><input type="text" name="account_name[]" class="form-control" placeholder="اسم الحساب"></td>
                            <td><input type="number" step="0.01" name="amount[]" class="form-control amount" onchange="updateTotals()"></td>
                            <td>
                                <select name="dc_type[]" class="form-select" onchange="updateTotals()">
                                    <option value="debit">مدين</option>
                                    <option value="credit">دائن</option>
                                </select>
                            </td>
                            <td><input type="text" name="notes[]" class="form-control"></td>
                            <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">حذف</button></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="2" class="text-end"><strong>الإجمالي:</strong></td>
                            <td colspan="4">
                                <span id="totalDebit" class="text-danger">0.00</span> مدين |
                                <span id="totalCredit" class="text-success">0.00</span> دائن
                                <span id="balanceMsg" class="ms-3"></span>
                            </td>
                        </tr>
                    </tfoot>
                </table>
                <button type="button" class="btn btn-sm btn-success" onclick="addRow()">
                    <i class="fas fa-plus"></i> إضافة سطر
                </button>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> حفظ القيد
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function addRow() {
        const tbody = document.getElementById('detailsBody');
        const newRow = tbody.insertRow();
        newRow.innerHTML = `
            <td>
                <select name="account_type[]" class="form-select">
                    <option value="cash">صندوق</option>
                    <option value="supplier">مورد</option>
                    <option value="customer">عميل</option>
                    <option value="expense">مصروفات</option>
                    <option value="income">إيرادات</option>
                </select>
            </td>
            <td><input type="text" name="account_name[]" class="form-control" placeholder="اسم الحساب"></td>
            <td><input type="number" step="0.01" name="amount[]" class="form-control amount" onchange="updateTotals()"></td>
            <td>
                <select name="dc_type[]" class="form-select" onchange="updateTotals()">
                    <option value="debit">مدين</option>
                    <option value="credit">دائن</option>
                </select>
            </td>
            <td><input type="text" name="notes[]" class="form-control"></td>
            <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">حذف</button></td>
        `;
    }

    function removeRow(btn) {
        const row = btn.closest('tr');
        row.remove();
        updateTotals();
    }

    function updateTotals() {
        let totalDebit = 0;
        let totalCredit = 0;

        const amounts = document.querySelectorAll('.amount');
        const rows = document.querySelectorAll('#detailsBody tr');

        rows.forEach((row, index) => {
            const amount = parseFloat(row.querySelector('.amount')?.value || 0);
            const type = row.querySelector('select[name="dc_type[]"]')?.value;

            if (type === 'debit') {
                totalDebit += amount;
            } else if (type === 'credit') {
                totalCredit += amount;
            }
        });

        document.getElementById('totalDebit').innerHTML = totalDebit.toFixed(2);
        document.getElementById('totalCredit').innerHTML = totalCredit.toFixed(2);

        const balanceMsg = document.getElementById('balanceMsg');
        if (Math.abs(totalDebit - totalCredit) < 0.01) {
            balanceMsg.innerHTML = '<span class="text-success">✓ القيد متوازن</span>';
        } else {
            balanceMsg.innerHTML = '<span class="text-danger">✗ القيد غير متوازن</span>';
        }
    }

    document.getElementById('journalForm').onsubmit = function() {
        updateTotals();
        const totalDebit = parseFloat(document.getElementById('totalDebit').innerHTML);
        const totalCredit = parseFloat(document.getElementById('totalCredit').innerHTML);

        if (Math.abs(totalDebit - totalCredit) > 0.01) {
            alert('القيد غير متوازن! يجب أن يكون مجموع المدين = مجموع الدائن');
            return false;
        }
        return true;
    };
</script>
{% endblock %}
