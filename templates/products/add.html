{% extends "base.html" %}

{% block title %}إضافة منتج جديد{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-box"></i> إضافة منتج جديد</h2>
        <a href="{{ url_for('products_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-right"></i> العودة للمنتجات
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">اسم المنتج *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="category" class="form-label">الفئة *</label>
                        <select class="form-control" id="category" name="category" required>
                            <option value="">اختر الفئة</option>
                            {% for category in categories %}
                            <option value="{{ category }}">{{ category }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="unit" class="form-label">الوحدة</label>
                        <select class="form-control" id="unit" name="unit">
                            <option value="قطعة">قطعة</option>
                            <option value="كيس">كيس</option>
                                                        <option value="كرتون">كرتون</option>
                            <option value="علبة">علبة</option>
                            <option value="زجاجة">زجاجة</option>
                            <option value="قارورة">قارورة</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="purchase_price" class="form-label">سعر الشراء</label>
                        <input type="number" step="0.01" class="form-control" id="purchase_price" name="purchase_price" value="0">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="selling_price" class="form-label">سعر البيع</label>
                        <input type="number" step="0.01" class="form-control" id="selling_price" name="selling_price" value="0">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="quantity" class="form-label">الكمية الافتتاحية</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" value="0">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="min_quantity" class="form-label">الحد الأدنى للمخزون</label>
                        <input type="number" class="form-control" id="min_quantity" name="min_quantity" value="10">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="location" class="form-label">موقع التخزين</label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="مثال: المستودع أ، الثلاجة 1">
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="is_frozen" name="is_frozen">
                            <label class="form-check-label" for="is_frozen">منتج مجمد (يحتاج ثلاجة)</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3" id="freeze_deposit_div" style="display: none;">
                        <label for="freeze_deposit" class="form-label">وديعة التجميد (ريال)</label>
                        <input type="number" step="0.01" class="form-control" id="freeze_deposit" name="freeze_deposit" value="0">
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">حفظ المنتج</button>
                    <a href="{{ url_for('products_list') }}" class="btn btn-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('is_frozen').addEventListener('change', function() {
        const div = document.getElementById('freeze_deposit_div');
        if (this.checked) {
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    });
</script>

<style>
    .btn-gradient {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 8px 20px;
        border-radius: 25px;
        text-decoration: none;
        transition: transform 0.3s;
    }
    .btn-gradient:hover {
        transform: translateY(-2px);
        color: white;
    }
</style>
{% endblock %}
