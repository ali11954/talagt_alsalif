{% extends "base.html" %}

{% block title %}تعديل منتج{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-edit"></i> تعديل منتج</h2>
        <a href="{{ url_for('products_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-right"></i> العودة للمنتجات
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">اسم المنتج *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="category" class="form-label">الفئة *</label>
                        <select class="form-control" id="category" name="category" required>
                            <option value="">اختر الفئة</option>
                            {% for category in categories %}
                            <option value="{{ category }}" {% if product.category == category %}selected{% endif %}>{{ category }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="unit" class="form-label">الوحدة</label>
                        <select class="form-control" id="unit" name="unit">
                            <option value="قطعة" {% if product.unit == 'قطعة' %}selected{% endif %}>قطعة</option>
                                                       <option value="كرتون" {% if product.unit == 'كرتون' %}selected{% endif %}>كرتون</option>

                            <option value="كيس" {% if product.unit == 'كيس' %}selected{% endif %}>كيس</option>
                            <option value="علبة" {% if product.unit == 'علبة' %}selected{% endif %}>علبة</option>
                            <option value="زجاجة" {% if product.unit == 'زجاجة' %}selected{% endif %}>زجاجة</option>
                            <option value="قارورة" {% if product.unit == 'قارورة' %}selected{% endif %}>قارورة</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="purchase_price" class="form-label">سعر الشراء</label>
                        <input type="number" step="0.01" class="form-control" id="purchase_price" name="purchase_price" value="{{ product.purchase_price }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="selling_price" class="form-label">سعر البيع</label>
                        <input type="number" step="0.01" class="form-control" id="selling_price" name="selling_price" value="{{ product.selling_price }}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="min_quantity" class="form-label">الحد الأدنى للمخزون</label>
                        <input type="number" class="form-control" id="min_quantity" name="min_quantity" value="{{ product.min_quantity }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="location" class="form-label">موقع التخزين</label>
                        <input type="text" class="form-control" id="location" name="location" value="{{ product.location or '' }}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" id="is_frozen" name="is_frozen" {% if product.is_frozen %}checked{% endif %}>
                            <label class="form-check-label" for="is_frozen">منتج مجمد</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3" id="freeze_deposit_div" style="display: {% if product.is_frozen %}block{% else %}none{% endif %};">
                        <label for="freeze_deposit" class="form-label">وديعة التجميد (ريال)</label>
                        <input type="number" step="0.01" class="form-control" id="freeze_deposit" name="freeze_deposit" value="{{ product.freeze_deposit }}">
                    </div>
                </div>

                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> ملاحظة: الكمية الحالية للمنتج هي <strong>{{ product.quantity }}</strong> {{ product.unit }}.
                    لا يمكن تعديل الكمية هنا، يتم تعديلها عبر عمليات الشراء والبيع.
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
                    <a href="{{ url_for('products_list') }}" class="btn btn-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('is_frozen').addEventListener('change', function() {
        const div = document.getElementById('freeze_deposit_div');
        if (this.checked) {
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
            document.getElementById('freeze_deposit').value = 0;
        }
    });
</script>
{% endblock %}
