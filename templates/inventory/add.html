{% extends "base.html" %}

{% block title %}إضافة منتج{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-plus"></i> إضافة منتج جديد</h2>
        <a href="{{ url_for('inventory') }}" class="btn-outline-gradient">
            <i class="fas fa-arrow-right"></i> رجوع
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">اسم المنتج *</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">الفئة *</label>
                        <select name="category" class="form-select" required>
                            <option value="water">مياه</option>
                            <option value="soda">مشروبات غازية</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">وحدة القياس</label>
                        <input type="text" name="unit" class="form-control" value="قطعة">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">الموقع في الثلاجة</label>
                        <input type="text" name="location" class="form-control" placeholder="مثال: رف 1، باب 2">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">سعر الشراء</label>
                        <input type="number" step="0.01" name="purchase_price" class="form-control" value="0">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">سعر البيع</label>
                        <input type="number" step="0.01" name="selling_price" class="form-control" value="0">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">الكمية الأولية</label>
                        <input type="number" name="quantity" class="form-control" value="0">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">الحد الأدنى للمخزون</label>
                        <input type="number" name="min_quantity" class="form-control" value="10">
                    </div>
                    <div class="col-md-12 mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="is_frozen" class="form-check-input" id="isFrozen">
                            <label class="form-check-label" for="isFrozen">
                                مجمد (يحتاج إلى درجة حرارة تحت الصفر)
                            </label>
                        </div>
                    </div>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn-gradient">
                        <i class="fas fa-save"></i> حفظ المنتج
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
